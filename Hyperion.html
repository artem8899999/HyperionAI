<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperion AI | Central Control 🔱</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    
    <style>
        :root { --cyan: #00ffff; --green: #00ff00; --red: #ff3333; }
        body { background: #050505; color: white; font-family: 'Consolas', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .panel { background: #0a0a0a; border: 2px solid var(--cyan); padding: 25px; border-radius: 15px; width: 90%; max-width: 550px; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); }
        h1 { color: var(--cyan); text-align: center; letter-spacing: 5px; text-shadow: 0 0 10px var(--cyan); font-size: 24px; margin-bottom: 20px; }
        
        #login-gate { text-align: center; }
        input { background: #000; border: 1px solid var(--cyan); color: var(--green); padding: 12px; width: 85%; margin: 10px 0; outline: none; border-radius: 5px; }
        button { background: var(--cyan); color: black; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; transition: 0.3s; border-radius: 5px; width: 100%; }
        button:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--cyan); }
        
        #admin-zone { display: none; border-top: 1px dashed var(--red); padding-top: 20px; }
        .user-box { background: #111; border: 1px solid #333; height: 100px; overflow-y: auto; margin-bottom: 15px; padding: 10px; font-size: 13px; }
        .user-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #222; }
        
        #ai-chat { background: #000; border: 1px solid var(--green); padding: 15px; border-radius: 10px; }
        #ai-log { height: 150px; overflow-y: auto; color: var(--green); font-size: 14px; border-bottom: 1px solid #222; margin-bottom: 10px; text-align: left; }
        .ask-btn { background: var(--green); color: black; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <h1>HYPERION OS 🔱</h1>
    
    <div id="login-gate">
        <p>> СИСТЕМА ІДЕНТИФІКАЦІЇ</p>
        <input type="email" id="email-field" placeholder="Введіть ваш Email...">
        <button onclick="checkAccess()">УВІЙТИ В КОНСОЛЬ</button>
    </div>

    <div id="admin-zone">
        <h3 style="color: var(--red); text-align: center; margin-top: 0;">[ АДМІН-ДОСТУП: АРТЕМ ]</h3>
        
        <p style="font-size: 12px;">👤 СПРАВЖНІ ЛЮДИ В МЕРЕЖІ:</p>
        <div id="user-list" class="user-box">Пошук сигналів...</div>

        <div id="ai-chat">
            <p style="color: var(--green); font-size: 12px; margin: 0 0 10px 0;">[ GOOGLE GEMINI AI CORE ]</p>
            <div id="ai-log">> Вітаю, Артеме. Проект 449439403247 активний. Чекаю на запит.</div>
            <input type="text" id="ai-input" placeholder="Напиши повідомлення..." style="width: 90%; border-color: var(--green);">
            <button class="ask-btn" onclick="callGemini()">ЗАПИТАТИ AI</button>
        </div>
    </div>
</div>

<script>
    const MY_EMAIL = "artemlitvinenko188@gmail.com";
    const API_KEY = "AIzaSyDkoGPC4abYye-2nyn3mlNEjrTMirOVQ2s"; // Твій ключ

    // Налаштування Firebase (База даних людей)
    const firebaseConfig = {
        apiKey: API_KEY,
        projectId: "449439403247", // Твій номер проекту
        databaseURL: "https://hyperion-44943-default-rtdb.firebaseio.com" 
    };

    // Ініціалізація бази
    try {
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();
    } catch(e) { console.log("Firebase Offline"); }

    function checkAccess() {
        const mail = document.getElementById('email-field').value.toLowerCase();
        
        // Реєструємо людину в базі в реальному часі
        if (typeof database !== 'undefined') {
            database.ref('online_users/' + btoa(mail)).set({
                email: mail,
                time: new Date().toLocaleTimeString()
            });
        }

        if (mail === MY_EMAIL) {
            document.getElementById('login-gate').style.display = 'none';
            document.getElementById('admin-zone').style.display = 'block';
            syncUsers();
        } else {
            alert("Ви зареєстровані в базі. Очікуйте підтвердження адміна.");
        }
    }

    function syncUsers() {
        database.ref('online_users').on('value', (snap) => {
            const data = snap.val();
            let html = "";
            for (let id in data) {
                if (data[id].email === MY_EMAIL) continue;
                html += `<div class="user-item">
                    <span>👤 ${data[id].email}</span>
                    <button style="background:red; color:white; padding:2px 8px; width:auto;" onclick="ban('${id}')">BAN</button>
                </div>`;
            }
            document.getElementById('user-list').innerHTML = html || "Користувачів немає.";
        });
    }

    function ban(id) {
        if(confirm("Заблокувати цього користувача?")) database.ref('online_users/' + id).remove();
    }

    // 🧠 ПІДКЛЮЧЕННЯ СПРАВЖНЬОГО AI GOOGLE
    async function callGemini() {
        const text = document.getElementById('ai-input').value;
        const log = document.getElementById('ai-log');
        if (!text) return;

        log.innerHTML += `<p style="color:white;">- ${text}</p>`;
        log.innerHTML += `<p style="color:yellow;">> Обробка запиту через Google AI... 🧠</p>`;
        document.getElementById('ai-input').value = "";
        log.scrollTop = log.scrollHeight;

        try {
            // Виклик API Gemini 1.5 Flash
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: "Ти - Hyperion AI, асистент Артема. Відповідай коротко і професійно. Питання: " + text }]
                    }]
                })
            });

            const resData = await resp.json();
            
            if (resData.candidates && resData.candidates[0].content.parts[0].text) {
                const aiText = resData.candidates[0].content.parts[0].text;
                log.innerHTML += `<p style="font-weight:bold; color:var(--green);">> ${aiText}</p>`;
            } else {
                log.innerHTML += `<p style="color:red;">> AI не зміг сформувати відповідь.</p>`;
            }
        } catch (e) {
            log.innerHTML += `<p style="color:red;">> Критична помилка: Перевір інтернет або API ключ!</p>`;
        }
        log.scrollTop = log.scrollHeight;
    }
</script>

</body>
</html>
